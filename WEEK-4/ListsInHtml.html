<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested Lists</title>
</head>
<body style="margin:30px">

    <!-- ─── Page Heading ─────────────────────────────────── -->
    <h1> Nested Unordered List</h1>

    <p>GeeksforGeeks course list:</p>

    <!-- ─── Nested List Structure ────────────────────────── -->
    <!-- Demonstrates nesting <ul> inside <li> for sub-categories -->
    <ul>
        <li> DSA</li>
        <!-- Sub-list: Data Structures under DSA -->
        <ul>
            <li> Array</li>
            <li> Linked List</li>
            <li> Stack</li>
            <li> Queue</li>
        </ul>

        <li> Web Technologies</li>
        <!-- Sub-list: Web tech stack -->
        <ul>
            <li> HTML</li>
            <li> CSS</li>
            <li> JavaScript</li>
        </ul>

        <li>Aptitude Preparation</li>
        <li> Gate</li>
        <li>Placement</li>
    </ul>

</body>
</html>
